<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node Details Interaction Comparison</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 20px; color: #111827; }
        .comparison { display: flex; gap: 40px; justify-content: space-around; }
        .window { width: 600px; height: 400px; background: #fff; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid #e5e7eb; position: relative; }
        .title-bar { height: 32px; background: #f9fafb; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; px: 10px; font-size: 12px; color: #6b7280; padding: 0 12px; }
        .shell { display: flex; height: calc(100% - 32px); }
        .sidebar { width: 120px; background: #fff; border-right: 1px solid #e5e7eb; display: flex; flex-direction: column; padding: 10px; gap: 8px; }
        .nav-item { height: 24px; background: #f3f4f6; border-radius: 4px; }
        .nav-item.active { background: #e8f0ff; border: 1px solid #3b82f6; }
        .main { flex: 1; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #f5f7fb; }
        .node-list { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        .node-card { height: 40px; background: #fff; border: 1px solid #e5e7eb; border-radius: 6px; display: flex; align-items: center; padding: 0 10px; font-size: 11px; }
        .footer-row { display: flex; height: 100px; gap: 10px; }
        .chart { flex: 1; background: #fff; border: 1px solid #e5e7eb; border-radius: 6px; }
        .details-fixed { width: 180px; background: #fff; border: 1px solid #e5e7eb; border-radius: 6px; padding: 8px; font-size: 10px; }
        
        /* Modal Style */
        .modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; }
        .modal-box { width: 250px; background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
        
        h3 { margin-bottom: 10px; text-align: center; }
        .label { font-weight: bold; color: #3b82f6; margin-bottom: 20px; display: block; text-align: center;}
    </style>
</head>
<body>
    <div class="comparison">
        <div>
            <span class="label">方案 1：固定详情面板 (设计图模式)</span>
            <div class="window">
                <div class="title-bar">Narya - Nodes</div>
                <div class="shell">
                    <div class="sidebar">
                        <div class="nav-item"></div>
                        <div class="nav-item active"></div>
                        <div class="nav-item"></div>
                    </div>
                    <div class="main">
                        <div class="node-list">
                            <div class="node-card">香港 HK 01</div>
                            <div class="node-card">新加坡 SG 01</div>
                            <div class="node-card">美国 US 01</div>
                        </div>
                        <div class="footer-row">
                            <div class="chart"></div>
                            <div class="details-fixed">
                                <b>节点详情</b><br>
                                地址: hkg01.narya.net<br>
                                协议: Shadowsocks<br>
                                加密: 2022-blake3...
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div>
            <span class="label">方案 2：居中弹窗详情 (任务描述模式)</span>
            <div class="window">
                <div class="title-bar">Narya - Nodes</div>
                <div class="shell">
                    <div class="sidebar">
                        <div class="nav-item"></div>
                        <div class="nav-item active"></div>
                        <div class="nav-item"></div>
                    </div>
                    <div class="main">
                        <div class="node-list">
                            <div class="node-card">香港 HK 01</div>
                            <div class="node-card">新加坡 SG 01</div>
                            <div class="node-card">美国 US 01</div>
                        </div>
                        <div class="footer-row">
                            <div class="chart" style="width: 100%;"></div>
                        </div>
                    </div>
                </div>
                <div class="modal-overlay">
                    <div class="modal-box">
                        <b>节点详情 (香港 · HK 01)</b>
                        <hr>
                        <p style="font-size: 11px;">地址: hkg01.narya.net:443</p>
                        <p style="font-size: 11px;">加密: 2022-blake3-aes-128-gcm</p>
                        <button style="width: 100%; padding: 5px; background: #3b82f6; color: #fff; border: none; border-radius: 4px; cursor: pointer;">关闭</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
